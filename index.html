<html><head><meta name=viewport content="width=device-width,initial-scale=1">
<title>Commadant Cup</title>
<style>
body{font-family:sans-serif;margin:20px;background:#f4f4f4;color:#222}
.box{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.1);cursor:pointer;}
h1{font-size:clamp(24px,8vw,48px);margin:0 0 10px}
.btn{display:inline-block;margin-top:10px;padding:8px 12px;background:#007aff;color:#fff;text-decoration:none;border-radius:6px}
</style>
</head>
<body>
<div class=box id="mainBox">
<h1>Click the button to find the answers you seek.</h1>
<a href="#" class=btn onclick="document.body.innerHTML=`<style>

.page{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:sans-serif;background:#f4f4f4;color:#222}
@media (prefers-color-scheme: dark){
.page{background:#000;color:#fff}
.num{color:#0f0;text-shadow:0 0 20px #0f0}
}
</style>
<div class='page' style='animation:fade .6s ease'>
<div class='num' style='font-size:clamp(60px,20vw,180px);font-weight:bold'>42</div>
<p style='font-size:clamp(16px,5vw,28px)'>The answer was always 42</p>
</div>`">Button</a>
</div>

</html>
